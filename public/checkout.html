<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Checkout | Cozy’s</title>
    <style>
        .checkout-form { max-width: 600px; margin: 0 auto; }
        .payment-methods { display: flex; gap: 20px; margin-bottom: 30px; }
        .payment-method { flex: 1; padding: 20px; border: 1px solid #ddd; cursor: pointer; text-align: center; }
        .payment-method.selected { border-color: #b89552; background: #f9f9f9; }
    </style>
</head>
<body>
    <nav style="background: #121212; padding: 20px 8%; display: flex; justify-content: space-between; align-items: center;">
        <div class="logo">COZY’S</div>
    </nav>

    <div class="container">
        <h2 style="margin-bottom: 30px; border-left: 5px solid #b89552; padding-left: 15px;">Secure Payment Portal</h2>
        
        <div class="checkout-form">
            <div class="payment-methods">
                <div class="payment-method selected" id="card">Credit/Debit Card</div>
                <div class="payment-method" id="bank">Bank Transfer</div>
                <div class="payment-method" id="wallet">Wallet Balance</div>
            </div>
            
            <form id="paymentForm">
                <div id="cardFields">
                    <input type="text" placeholder="Card Number" required>
                    <input type="text" placeholder="Expiry Date (MM/YY)" required>
                    <input type="text" placeholder="CVV" required>
                    <input type="text" placeholder="Cardholder Name" required>
                </div>
                <div id="bankFields" style="display: none;">
                    <p>Transfer to Account: 1234567890 (Cozy’s Bank)</p>
                    <input type="text" placeholder="Reference Number" required>
                </div>
                <div id="walletFields" style="display: none;">
                    <p>Pay from Wallet Balance</p>
                </div>
                
                <button type="submit" class="btn-gold" style="margin-top: 30px;">Complete Purchase</button>
            </form>
        </div>
    </div>

    <script>
        const methods = document.querySelectorAll('.payment-method');
        methods.forEach(method => {
            method.addEventListener('click', () => {
                methods.forEach(m => m.classList.remove('selected'));
                method.classList.add('selected');
                
                document.getElementById('cardFields').style.display = method.id === 'card' ? 'block' : 'none';
                document.getElementById('bankFields').style.display = method.id === 'bank' ? 'block' : 'none';
                document.getElementById('walletFields').style.display = method.id === 'wallet' ? 'block' : 'none';
            });
        });

        document.getElementById('paymentForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Mock payment success
            localStorage.removeItem('cozys_cart');
            alert('Payment successful! Your order has been placed.');
            window.location.href = 'product.html';
        });
    </script>
</body>
</html></content>
